{% extends "layout.html" %}

{% block title %}AgentHub - 智能体管理{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/agents.css') }}">
{% endblock %}

{% block content %}
<div class="agents-page">
    <header class="page-header">
        <div class="page-header-content">
            <h1>智能体管理</h1>
            <p>管理和配置您的 AI 智能体</p>
        </div>
        <div class="page-header-actions">
            <button class="btn btn-primary" onclick="location.href='/agents/create'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                创建智能体
            </button>
        </div>
    </header>
    
    <!-- 筛选工具栏 -->
    <div class="filter-bar">
        <div class="search-box" style="flex: 1; max-width: 400px;">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" class="input" placeholder="搜索智能体..." id="searchInput">
        </div>
        <div class="filter-group">
            <select class="input" id="categoryFilter">
                <option value="">全部分类</option>
            </select>
            <select class="input" id="sortFilter">
                <option value="name">按名称排序</option>
                <option value="usage">按使用量排序</option>
                <option value="newest">最新创建</option>
            </select>
        </div>
    </div>
    
    <!-- 分类卡片 -->
    <section class="categories-section">
        <div class="categories-scroll" id="categoriesScroll">
            <!-- 动态加载 -->
        </div>
    </section>
    
    <!-- 智能体列表 -->
    <section class="agents-section">
        <div class="agents-grid" id="agentsGrid">
            <!-- 动态加载 -->
        </div>
        
        <div class="loading-state" id="loadingState">
            <div class="spinner"></div>
            <span>加载中...</span>
        </div>
        
        <div class="empty-state" id="emptyState" style="display: none;">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 12h8M12 8v8"/>
            </svg>
            <h3>暂无智能体</h3>
            <p>还没有创建任何智能体，开始创建您的第一个智能体吧</p>
            <button class="btn btn-primary" onclick="location.href='/agents/create'">
                创建智能体
            </button>
        </div>
    </section>
</div>

<!-- 删除确认模态框 -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title">确认删除</h3>
            <button class="modal-close" onclick="closeDeleteModal()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="modal-body">
            <p>确定要删除智能体 <strong id="deleteAgentName"></strong> 吗？</p>
            <p style="color: var(--text-muted); font-size: 14px; margin-top: 8px;">此操作不可撤销</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeDeleteModal()">取消</button>
            <button class="btn btn-danger" id="confirmDelete">确认删除</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const agentManager = {
    agents: [],
    categories: [],
    currentAgentId: null,
    
    async init() {
        await Promise.all([this.loadCategories(), this.loadAgents()]);
        this.initFilters();
        this.initSearch();
    },
    
    async loadCategories() {
        try {
            const res = await fetch('/api/agents/categories');
            const data = await res.json();
            this.categories = data.data;
            this.renderCategoryFilters();
            this.renderCategoryCards();
        } catch (error) {
            console.error('加载分类失败:', error);
        }
    },
    
    async loadAgents() {
        document.getElementById('loadingState').style.display = 'flex';
        document.getElementById('emptyState').style.display = 'none';
        
        try {
            const res = await fetch('/api/agents');
            const data = await res.json();
            this.agents = data.data;
            this.renderAgents();
        } catch (error) {
            console.error('加载智能体失败:', error);
        } finally {
            document.getElementById('loadingState').style.display = 'none';
        }
    },
    
    renderCategoryFilters() {
        const select = document.getElementById('categoryFilter');
        select.innerHTML = '<option value="">全部分类</option>' + 
            this.categories.map(cat => 
                `<option value="${cat.id}">${cat.icon} ${cat.name}</option>`
            ).join('');
    },
    
    renderCategoryCards() {
        const container = document.getElementById('categoriesScroll');
        container.innerHTML = this.categories.map(cat => {
            const count = this.agents.filter(a => a.category === cat.id).length;
            return `
                <div class="category-card" data-category="${cat.id}" onclick="agentManager.filterByCategory('${cat.id}')">
                    <div class="category-icon" style="background: ${cat.color}20; color: ${cat.color};">
                        ${cat.icon}
                    </div>
                    <div class="category-info">
                        <div class="category-name">${cat.name}</div>
                        <div class="category-count">${count} 个智能体</div>
                    </div>
                </div>
            `;
        }).join('');
    },
    
    renderAgents() {
        const grid = document.getElementById('agentsGrid');
        const emptyState = document.getElementById('emptyState');
        
        if (this.agents.length === 0) {
            grid.style.display = 'none';
            emptyState.style.display = 'block';
            return;
        }
        
        grid.style.display = 'grid';
        grid.innerHTML = this.agents.map(agent => this.renderAgentCard(agent)).join('');
    },
    
    renderAgentCard(agent) {
        const category = this.categories.find(c => c.id === agent.category);
        return `
            <div class="agent-card" data-agent-id="${agent.id}">
                <div class="agent-card-header">
                    <div class="agent-avatar" style="background: ${agent.color}20;">
                        <span style="font-size: 28px;">${agent.icon}</span>
                    </div>
                    <div class="dropdown">
                        <button class="btn btn-ghost dropdown-trigger">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <circle cx="12" cy="12" r="1"/>
                                <circle cx="12" cy="5" r="1"/>
                                <circle cx="12" cy="19" r="1"/>
                            </svg>
                        </button>
                        <div class="dropdown-menu">
                            <div class="dropdown-item" onclick="agentManager.editAgent('${agent.id}')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                                编辑
                            </div>
                            <div class="dropdown-item" onclick="agentManager.chatWithAgent('${agent.id}')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                                </svg>
                                开始对话
                            </div>
                            <div class="dropdown-divider"></div>
                            <div class="dropdown-item danger" onclick="agentManager.confirmDelete('${agent.id}')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                </svg>
                                删除
                            </div>
                        </div>
                    </div>
                </div>
                <div class="agent-card-body">
                    <h3 class="agent-name">${agent.name}</h3>
                    <div class="agent-category">
                        <span class="category-badge" style="background: ${category?.color}20; color: ${category?.color};">
                            ${category?.icon} ${category?.name}
                        </span>
                    </div>
                    <p class="agent-desc">${agent.description}</p>
                    <div class="agent-capabilities">
                        ${agent.capabilities.slice(0, 3).map(cap => 
                            `<span class="capability-tag">${cap}</span>`
                        ).join('')}
                        ${agent.capabilities.length > 3 ? `<span class="capability-more">+${agent.capabilities.length - 3}</span>` : ''}
                    </div>
                </div>
                <div class="agent-card-footer">
                    <div class="agent-stat">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                        ${agent.usage_count || 0} 次对话
                    </div>
                    <div class="agent-stat">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                        ${formatDate(agent.created_at)}
                    </div>
                </div>
            </div>
        `;
    },
    
    initFilters() {
        document.getElementById('categoryFilter').addEventListener('change', () => this.applyFilters());
        document.getElementById('sortFilter').addEventListener('change', () => this.applyFilters());
    },
    
    initSearch() {
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', debounce(() => this.applyFilters(), 300));
    },
    
    filterByCategory(categoryId) {
        document.getElementById('categoryFilter').value = categoryId;
        this.applyFilters();
        
        // 更新选中状态
        document.querySelectorAll('.category-card').forEach(card => {
            card.classList.toggle('active', card.dataset.category === categoryId);
        });
    },
    
    applyFilters() {
        const category = document.getElementById('categoryFilter').value;
        const sort = document.getElementById('sortFilter').value;
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        let filtered = [...this.agents];
        
        // 分类筛选
        if (category) {
            filtered = filtered.filter(a => a.category === category);
        }
        
        // 搜索筛选
        if (search) {
            filtered = filtered.filter(a => 
                a.name.toLowerCase().includes(search) ||
                a.description.toLowerCase().includes(search) ||
                a.capabilities.some(c => c.toLowerCase().includes(search))
            );
        }
        
        // 排序
        switch (sort) {
            case 'name':
                filtered.sort((a, b) => a.name.localeCompare(b.name));
                break;
            case 'usage':
                filtered.sort((a, b) => (b.usage_count || 0) - (a.usage_count || 0));
                break;
            case 'newest':
                filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                break;
        }
        
        // 渲染
        const grid = document.getElementById('agentsGrid');
        if (filtered.length === 0) {
            grid.style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
        } else {
            grid.style.display = 'grid';
            document.getElementById('emptyState').style.display = 'none';
            grid.innerHTML = filtered.map(agent => this.renderAgentCard(agent)).join('');
        }
    },
    
    editAgent(agentId) {
        location.href = `/agents/${agentId}/edit`;
    },
    
    chatWithAgent(agentId) {
        location.href = `/chat?agent=${agentId}`;
    },
    
    confirmDelete(agentId) {
        const agent = this.agents.find(a => a.id === agentId);
        if (!agent) return;
        
        this.currentAgentId = agentId;
        document.getElementById('deleteAgentName').textContent = agent.name;
        document.getElementById('deleteModal').classList.add('active');
    },
    
    async deleteAgent() {
        if (!this.currentAgentId) return;
        
        try {
            const res = await fetch(`/api/agents/${this.currentAgentId}`, {
                method: 'DELETE'
            });
            
            if (res.ok) {
                showToast('删除成功', 'success');
                await this.loadAgents();
            } else {
                throw new Error('删除失败');
            }
        } catch (error) {
            showToast('删除失败: ' + error.message, 'error');
        } finally {
            closeDeleteModal();
        }
    }
};

function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('active');
}

document.getElementById('confirmDelete').addEventListener('click', () => agentManager.deleteAgent());

agentManager.init();
</script>
{% endblock %}
