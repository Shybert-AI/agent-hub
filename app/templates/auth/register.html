<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - AgentHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #6366F1;
            --secondary-color: #8B5CF6;
            --bg-primary: #0F172A;
            --bg-secondary: #1E293B;
            --bg-tertiary: #334155;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-color: #334155;
            --success-color: #10B981;
            --danger-color: #EF4444;
            --warning-color: #F59E0B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .auth-container {
            display: flex;
            min-height: 100vh;
        }

        .auth-left {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            overflow: hidden;
        }

        .auth-left-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/static/images/login-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }

        .auth-left-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        .auth-left-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 500px;
        }

        .brand {
            text-align: center;
            z-index: 1;
        }

        .brand-logo {
            font-size: 80px;
            color: white;
            margin-bottom: 24px;
        }

        .brand-logo i {
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
        }

        .brand-name {
            font-size: 48px;
            font-weight: 700;
            color: #1E293B;
            margin-bottom: 16px;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }

        .auth-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 60px;
            background: var(--bg-primary);
            overflow-y: auto;
        }

        .auth-page-header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        .brand-title {
            font-size: 32px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 16px;
        }

        .brand-tagline {
            font-size: 18px;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.8;
            font-weight: 500;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
        }

        .input-with-icon .form-input {
            padding-left: 44px;
        }

        .form-help {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .auth-divider span {
            padding: 0 16px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 32px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: var(--secondary-color);
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: var(--success-color);
            color: white;
        }

        .toast.error {
            background: var(--danger-color);
            color: white;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .auth-container {
                flex-direction: column;
            }

            .auth-left {
                padding: 40px 20px;
                min-height: auto;
            }

            .brand-logo {
                font-size: 48px;
            }

            .brand-name {
                font-size: 28px;
            }

            .brand-title {
                font-size: 22px;
            }

            .brand-tagline {
                font-size: 16px;
            }

            .brand-features {
                gap: 20px;
                flex-wrap: wrap;
            }

            .auth-right {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-left-bg"></div>
            <div class="auth-left-overlay"></div>
            <div class="auth-left-content">
                <div class="brand-logo">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <h1 class="brand-name">AgentHub</h1>
            </div>
        </div>

        <div class="auth-right">
            <div class="auth-page-header">
                <h2 class="brand-title">AI虚拟公司</h2>
                <p class="brand-tagline">
                    一人顶一个团队<br>
                    让AI成为你的超级助手
                </p>
            </div>
            <div class="auth-card">
                <div class="auth-header">
                    <h1>创建账户</h1>
                    <p>加入 AgentHub 开始使用AI智能体</p>
                </div>

                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" class="form-input" name="username" placeholder="请输入用户名" required minlength="2" maxlength="32">
                        </div>
                        <p class="form-help">长度2-32个字符</p>
                    </div>

                    <div class="form-group">
                        <label class="form-label">邮箱地址</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" class="form-input" name="email" placeholder="请输入邮箱" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" class="form-input" name="password" placeholder="请输入密码" required minlength="6">
                        </div>
                        <p class="form-help">至少6个字符</p>
                    </div>

                    <div class="form-group">
                        <label class="form-label">确认密码</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" class="form-input" name="confirm_password" placeholder="请再次输入密码" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i class="fa-solid fa-user-plus"></i>
                        注册
                    </button>
                </form>

                <div class="auth-divider">
                    <span>或者</span>
                </div>

                <button class="btn btn-secondary" onclick="location.href='/login'">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    已有账户？登录
                </button>

                <div class="auth-footer">
                    <a href="/">返回首页</a>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 注册中...';

            const formData = {
                username: e.target.username.value,
                email: e.target.email.value,
                password: e.target.password.value,
                confirm_password: e.target.confirm_password.value
            };

            if (formData.password !== formData.confirm_password) {
                showToast('两次密码输入不一致', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> 注册';
                return;
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await res.json();

                if (data.code === 0) {
                    showToast('注册成功，即将跳转...', 'success');
                    setTimeout(() => {
                        location.href = '/';
                    }, 1000);
                } else {
                    showToast(data.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> 注册';
                }
            } catch (error) {
                showToast('注册失败，请稍后重试', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> 注册';
            }
        });
    </script>
</body>
</html>
